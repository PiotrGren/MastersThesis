# ==============================================================================
# CONFIG: BiLSTM Fusion Training (Baseline)
# ==============================================================================

SYSTEM:
  OUTPUT_DIR: "./outputs/v1"              # Tu trafią logi i checkpointy
  DEVICE: "cuda"                          # Lub "cpu"
  SEED: 169783

DATA:
  # Należy upewnić się, że ścieżki wskazują na pliki wygenerowane przez process_data.py
  TRAIN_PATH: "../data/train_data.pt"
  VAL_PATH: "../data/val_data.pt"
  VOCAB_PATH: "../data/vocab.json"
  NUM_WORKERS: 0  # Na Windows daj 0, na Linuxie 2-4

MODEL:
  HIDDEN_DIM: 192
  LAYERS: 1
  DROPOUT: 0.3
  ATTN_DROPOUT: 0.1
  BIDIRECTIONAL: True
  USE_ATTENTION: True
  NUM_CLASSES: 3  # (0: ReadOnly, 1: Active, 2: ActiveAnalyst) - zgodne z LABEL_MAP

SOLVER:
  OPTIMIZER: "AdamW"
  BASE_LR: 0.001
  WEIGHT_DECAY: 0.0001
  CLIP_GRADIENTS: 1.0
  
  MAX_ITER: 5000         # Całkowita długość treningu
  USR_PER_BATCH: 32      # Wielkość batcha
  
  # Kiedy zmniejszyć LR (w iteracjach)
  STEPS: [3000, 4000]
  GAMMA: 0.1
  
  # Rozgrzewka
  WARMUP_ITERS: 500
  WARMUP_FACTOR: 0.001

PERIODS:
  LOG_PERIOD: 25         # Co ile iteracji logować w konsoli
  EVAL_PERIOD: 250       # Co ile iteracji robić walidację
  CHECKPOINT_PERIOD: 500 # Co ile iteracji robić backup